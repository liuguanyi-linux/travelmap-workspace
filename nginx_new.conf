server {
    listen 80;
    server_name anjen.net;
    return 301 http://www.anjen.net$request_uri;
}

server {
    listen 80;
    server_name www.anjen.net;

    # Increase body size for all uploads
    client_max_body_size 50M;

    root /www/travelmap/frontend/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
        # Disable cache for index.html to ensure updates are seen immediately
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Cache static assets (JS, CSS, Images) aggressively since they have hash in filename
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /api {
        rewrite ^/api/(.*) /$1 break;
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Serve uploads directly via Nginx for better performance
    location /uploads/ {
        alias /www/travelmap/backend/uploads/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }
}
